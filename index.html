<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Document</title>

</head>

<body class="bg-base-200 py-10 px-35">

    <!-- JOB APPLICATION TRACKER -->
    <div class="upper space-y-2 border-b-[#E6E7E9] border-b-1 pb-5">
        <h1 class="text-3xl text-indigo-950 font-bold">Job Application Tracker</h1>
        <div class="info grid grid-cols-3 w-full gap-5">
            <div class="total bg-base-100 rounded-md p-5 pb-10">
                <h2 class="text-sm text-indigo-950 font-semibold">Total</h2>
                <p id="total" class="text-indigo-950 font-bold text-sm">8</p>
            </div>
            <div class="interview bg-base-100 rounded-md p-5 pb-10">
                <h2 class="text-sm text-indigo-950 font-semibold">Interview</h2>
                <p id="interview" class="text-green-500 font-bold text-sm">0</p>
            </div>
            <div class="rejected bg-base-100 rounded-md p-5 pb-10">
                <h2 class="text-sm text-indigo-950 font-semibold">Rejected</h2>
                <p id="reject" class="text-red-600 font-bold text-sm">0</p>
            </div>
        </div>
    </div>


    <div class="available mt-4">
        <h2 class="mb-2 text-2xl text-indigo-950 font-semibold">Available Jobs</h2>
        <div class="btns grid grid-cols-3 w-1/3 gap-10">
            <button class="btn btn-sm bg-base-300 text-xs" onclick="active(this)">All</button>
            <button class="btn btn-sm bg-base-300 text-xs" onclick="active(this)">Interview</button>
            <button class="btn btn-sm bg-base-300 text-xs" onclick="active(this)">Rejected</button>
        </div>
    </div>

    <script src="js/btntoggle.js"></script>


</body>

</html>
